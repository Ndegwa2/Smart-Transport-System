<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }
        h2 {
            color: #ff8c00; /* Orange */
        }
        input[type="email"],
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #ff8c00; /* Orange */
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e07a00;
        }
        a {
            color: #ff8c00; /* Orange */
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Forgot Password</h2>
        <form id="forgot-password-form">
            <input type="email" id="reset-email" placeholder="Email" required><br>
            <button type="button" id="send-code-button">Send Code</button><br>
            <input type="text" id="reset-code" placeholder="Code" required><br>
            <button type="submit">Reset Password</button>
        </form>
    </div>

    <script>
        document.getElementById('send-code-button').addEventListener('click', function() {
            alert('Code sent to your email!'); // Placeholder
        });

        document.getElementById('forgot-password-form').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Password reset successfully!'); // Placeholder
        });
    </script>
</body>
</html>
